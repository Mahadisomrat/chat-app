
<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatBD — {{ other }} এর সাথে চ্যাট</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.6.1/socket.io.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Hind Siliguri', sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .chat-box {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    width: 420px;
    height: 600px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 25px 50px rgba(0,0,0,0.5);
  }
  .chat-header {
    padding: 16px 20px;
    background: rgba(124,111,205,0.3);
    border-bottom: 1px solid rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .back { color: rgba(255,255,255,0.6); text-decoration: none; font-size: 20px; line-height: 1; }
  .back:hover { color: #fff; }
  .avatar-sm {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: linear-gradient(135deg, #7c6fcd, #5a4fcf);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 700; font-size: 16px;
  }
  .chat-header .info .name { color: #fff; font-size: 16px; font-weight: 700; }
  .chat-header .info .status { color: rgba(255,255,255,0.5); font-size: 12px; }
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.1) transparent;
  }
  .msg {
    max-width: 75%;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .msg.mine { align-self: flex-end; align-items: flex-end; }
  .msg.theirs { align-self: flex-start; align-items: flex-start; }
  .bubble {
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 15px;
    line-height: 1.5;
    word-break: break-word;
  }
  .msg.mine .bubble {
    background: linear-gradient(135deg, #7c6fcd, #5a4fcf);
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .msg.theirs .bubble {
    background: rgba(255,255,255,0.12);
    color: #fff;
    border-bottom-left-radius: 4px;
  }
  .time { color: rgba(255,255,255,0.35); font-size: 11px; padding: 0 2px; }
  .chat-input {
    padding: 12px 16px;
    border-top: 1px solid rgba(255,255,255,0.1);
    display: flex;
    gap: 10px;
    background: rgba(0,0,0,0.2);
  }
  .chat-input input {
    flex: 1;
    padding: 11px 16px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 24px;
    color: #fff;
    font-size: 14px;
    font-family: 'Hind Siliguri', sans-serif;
    outline: none;
    transition: border 0.2s;
  }
  .chat-input input:focus { border-color: #7c6fcd; }
  .chat-input input::placeholder { color: rgba(255,255,255,0.3); }
  .send-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, #7c6fcd, #5a4fcf);
    border: none;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.2s, transform 0.1s;
  }
  .send-btn:hover { opacity: 0.85; transform: scale(1.05); }
</style>
</head>
<body>
<div class="chat-box">
  <div class="chat-header">
    <a href="/home" class="back">←</a>
    <div class="avatar-sm">{{ other[0] }}</div>
    <div class="info">
      <div class="name">{{ other }}</div>
      <div class="status" id="status">...</div>
    </div>
  </div>

  <div class="messages" id="messages">
    {% for msg in history %}
    <div class="msg {% if msg.sender == me %}mine{% else %}theirs{% endif %}">
      <div class="bubble">{{ msg.text }}</div>
      <div class="time">{{ msg.time }}</div>
    </div>
    {% endfor %}
  </div>

  <div class="chat-input">
    <input type="text" id="msg-input" placeholder="মেসেজ লিখুন..." autocomplete="off">
    <button class="send-btn" onclick="sendMsg()">➤</button>
  </div>
</div>

<script>
  const socket = io({ transports: ['polling'] });
  const me = "{{ me }}";
  const other = "{{ other }}";
  const room = "{{ room }}";

  socket.on('connect', function() {
    socket.emit('join', { room: room });
  });

  document.getElementById('msg-input').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') sendMsg();
  });

  function sendMsg() {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text) return;
    socket.emit('send_message', { room: room, from: me, text: text });
    input.value = '';
  }

  socket.on('receive_message', function(msg) {
    addMessage(msg);
  });

  socket.on('user_status', function(data) {
    if (data.user === other) {
      const st = document.getElementById('status');
      st.textContent = data.status === 'online' ? '🟢 অনলাইন' : '⚫ অফলাইন';
    }
  });

  function addMessage(msg) {
    const div = document.createElement('div');
    div.className = 'msg ' + (msg.from === me ? 'mine' : 'theirs');
    div.innerHTML = '<div class="bubble">' + escapeHtml(msg.text) + '</div><div class="time">' + msg.time + '</div>';
    document.getElementById('messages').appendChild(div);
    document.getElementById('messages').scrollTop = 9999;
  }

  function escapeHtml(text) {
    return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  window.onload = () => {
    const m = document.getElementById('messages');
    m.scrollTop = m.scrollHeight;
  };
</script>
</body>
</html>
